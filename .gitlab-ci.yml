stages:
  - predict
  - build

# Étape 1: Prédiction ML avant le build
predict:
  stage: predict
  script:
    - echo "🔮 Appel à l'API de prédiction..."
    - |
      curl -X POST "https://mateo-charmless-velia.ngrok-free.dev/api/v1/ml/predict/simple" \
        -H "Content-Type: application/json" \
        -d '{"pipeline_name": "'"${CI_PROJECT_NAME}"'", "source": "gitlab-ci"}'

# Étape 2: Build réel (s'exécute si la prédiction est bonne)
build:
  stage: build
  script:
    - echo "🏗️ Build en cours..."
    - echo "Build terminé avec succès!"