stages:
  - predict
  - test

variables:
  API_URL: "https://mateo-charmless-velia.ngrok-free.dev"

predict-before-build:
  stage: predict
  script:
    - echo "🔮 Prédiction du risque d'échec..."
    - |
      curl -X POST ${API_URL}/api/v1/ml/predict/simple \
        -H "Content-Type: application/json" \
        -d '{"pipeline_name": "'"${CI_PROJECT_NAME}"'", "source": "gitlab-ci"}'
  allow_failure: true

test-job:
  stage: test
  script:
    - echo "🧪 Tests en cours..."
    - sleep 3
    - echo "✅ Tests terminés!"