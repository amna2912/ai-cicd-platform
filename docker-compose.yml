version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: ai-postgres
    environment:
      POSTGRES_DB: ai_platform
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5
  jenkins:
    image: jenkins/jenkins:lts
    container_name: ai-jenkins
    ports:
    - "8081:8080"  
    - "50000:50000"
    volumes:
    - jenkins_data:/var/jenkins_home
    - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

   

  minio:
    image: minio/minio:latest
    container_name: ai-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  redis:
    image: redis:7
    container_name: ai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: ./app
    container_name: ai-app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://admin:password123@postgres:5432/ai_platform
      REDIS_URL: redis://redis:6379
    volumes:
      - ./app:/app
      - ./data:/data
      - ./models:/models
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
  jenkins_data: